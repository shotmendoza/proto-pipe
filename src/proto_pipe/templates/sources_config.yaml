# sources_config.yaml
#
# Defines the data sources the pipeline will ingest.
# Run `vp new-source` to add a source interactively.
#
# on_duplicate controls what happens when a new file contains a row whose
# primary key already exists in the table:
#
#   flag — (default) flag the conflict in flagged_rows for manual review
#   upsert — replace the existing row with the incoming row
#   append — insert the new row regardless (allows duplicates)
#   skip — keep the existing row, silently discard the incoming row
#
# on_duplicate requires primary_key to be defined. If primary_key is absent,
# on_duplicate is ignored and all rows are appended.
#
# Example (uncomment and edit to use):
#
# sources:
#   - name: "sales"
#     patterns:
#       - "sales_*.csv"
#     target_table: "sales"
#     timestamp_col: "updated_at"
#     primary_key: "order_id"
#     on_duplicate: "flag"

sources: []