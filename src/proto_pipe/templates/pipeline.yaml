# pipeline.yaml
# -------------
# Project-level path settings for the validation pipeline.
#
# Every path here can be overridden at runtime with a CLI flag
# (e.g. --pipeline-db, --incoming-dir). This file just sets the defaults
# so you don't have to pass flags on every command.
#
# Run `vp config show` to see the current resolved values.
# Run `vp config set <key> <value>` to update a value without editing this file.
#
# All paths can be absolute or relative. Relative paths are resolved from
# the directory where this file lives, not from your working directory.
# Using absolute paths (e.g. /Volumes/SharedDrive/...) avoids ambiguity.
#
# Keys marked [required] have defaults that will likely be wrong
# for your project. Update them before running `vp db-init`.
# Keys marked [optional] work fine with the defaults for most setups.

paths:

  # [required] Directory where incoming source files arrive.
  # Point this at the shared folder where your data files are dropped.
  # `vp ingest` scans this directory and loads any files that match a
  # pattern defined in sources_config.yaml.
  # Example: "/Volumes/SharedDrive/data/incoming/"
  incoming_dir: "data/incoming/"

  # [optional] Directory where deliverable output files are written.
  # `vp pull-report` writes CSV and Excel files here.
  # Can be overridden per deliverable in deliverables_config.yaml.
  output_dir: "output/reports/"

  # [optional] Path to sources_config.yaml.
  # Defines which files to ingest and what tables they map to.
  sources_config: "config/sources_config.yaml"

  # [optional] Path to reports_config.yaml.
  # Defines validation checks and which tables they run against.
  reports_config: "config/reports_config.yaml"

  # [optional] Path to deliverables_config.yaml.
  # Defines output files — which reports to include, format, filters.
  deliverables_config: "config/deliverables_config.yaml"

  # [optional] Path to views_config.yaml.
  # Defines shared SQL views used across deliverables.
  views_config: "config/views_config.yaml"

  # [optional] Path to the main DuckDB database file.
  # This is where ingested tables, flagged rows, and report run history live.
  # Created automatically by `vp db-init`. Safe to leave as-is.
  pipeline_db: "data/pipeline.db"

  # [optional] Path to the watermark DuckDB database file.
  # Tracks the last successful validation run per report so only new rows
  # are checked on subsequent runs. Created automatically by `vp db-init`.
  watermark_db: "data/watermarks.db"

# [optional] When true, vp new source will show a multi-select checkbox for
# column parameters on eligible checks (those that return pd.Series[bool]
# with str-typed column params). Each selected column results in a separate
# check execution. Set to false to always use single-select.
multi_select_params: true

# [optional] Directory containing custom SQL macro files.
# Macros are available to all deliverable SQL files.
macros_dir: "macros"

# [optional] Path to your custom checks file.
# Define your own check functions here and they will be loaded automatically.
custom_checks_module: "checks/my_checks.py"
